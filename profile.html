<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Verity | Real Connections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="fb-style.css">
    <link rel="shortcut icon" href="icons/logo.svg" type="image/x-icon">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom fixed-top shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center me-3" href="home.html">
                    <img src="icons/logo.svg" alt="Verity" style="height: 40px; margin-right: 8px;">
                    Verity
                </a>
                <div class="input-group search-box">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                    <input type="search" class="form-control bg-light border-0" placeholder="Search Verity">
                </div>
            </div>
            
            <ul class="navbar-nav mx-auto d-none d-lg-flex">
                <li class="nav-item">
                    <a class="nav-link" href="home.html"><i class="bi bi-house-door-fill fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="friends.html"><i class="bi bi-people fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="watch.html"><i class="bi bi-play-btn fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="groups.html"><i class="bi bi-collection fs-4"></i></a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light rounded-circle p-2"><i class="bi bi-grid-3x3-gap-fill"></i></button>
                <button class="btn btn-light rounded-circle p-2" onclick="window.location.href='messages.html'"><i class="bi bi-chat-dots-fill"></i></button>
                <a href="notifications.html" class="btn btn-light rounded-circle p-2 position-relative">
                    <i class="bi bi-bell-fill"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display: none;">
                        0
                    </span>
                </a>
                <div class="dropdown">
                    <button class="btn p-0" data-bs-toggle="dropdown">
                        <img src="https://via.placeholder.com/40" class="rounded-circle" alt="Profile" id="navProfilePic">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="login.html" onclick="auth.signOut()"><i class="bi bi-box-arrow-right me-2"></i> Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-page" style="margin-top: 60px;">
        <!-- Cover Photo Section -->
        <div class="bg-white border-bottom">
            <div class="container">
                <div class="cover-photo position-relative" style="height: 350px; background: #e9ecef; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200&h=400&fit=crop" class="w-100 h-100 object-fit-cover" alt="Cover" id="coverPhoto">
                    <button class="btn btn-light position-absolute bottom-0 end-0 m-3 shadow-sm">
                        <i class="bi bi-camera-fill me-2"></i>Edit cover photo
                    </button>
                </div>
                
                <div class="profile-header px-4">
                    <div class="row align-items-end">
                        <div class="col-lg-8">
                            <div class="d-flex align-items-end gap-3 flex-wrap">
                                <div class="profile-picture position-relative" style="margin-top: -60px;">
                                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=168&h=168&fit=crop" class="rounded-circle border border-4 border-white shadow-lg" width="168" height="168" alt="Profile" id="profilePic">
                                    <button class="btn btn-light rounded-circle position-absolute bottom-0 end-0 m-2 shadow-sm">
                                        <i class="bi bi-camera-fill"></i>
                                    </button>
                                </div>
                                <div class="mb-3">
                                    <h2 class="fw-bold mb-0" id="userName">Loading...</h2>
                                    <div class="text-muted" id="friendCount">0 friends</div>
                                    <div class="d-flex mt-2" id="friendAvatars">
                                        <!-- Avatars will be injected here -->
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4 text-end mb-3">
                            <button class="btn btn-primary"><i class="bi bi-plus-lg me-2"></i>Add to story</button>
                            <button class="btn btn-light border"><i class="bi bi-pencil-fill me-2"></i>Edit profile</button>
                        </div>
                    </div>
                    
                    <hr class="my-2">
                    
                    <ul class="nav nav-tabs border-0">
                        <li class="nav-item">
                            <a class="nav-link active fw-semibold" href="#">Posts</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="#">Friends</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fw-semibold" href="#">Photos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="container mt-3">
            <div class="row">
                <!-- Left Column -->
                <div class="col-lg-5">
                    <!-- Intro Card -->
                    <div class="card mb-3 border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3">Intro</h5>
                            <div class="text-center mb-3">
                                <p id="userBio" class="mb-2">No bio yet.</p>
                                <button class="btn btn-light w-100 border">Add bio</button>
                            </div>
                            <div class="mb-2">
                                <i class="bi bi-house-fill me-2 text-muted"></i>Lives in <strong id="userLocation">Not set</strong>
                            </div>
                            <div class="mb-2">
                                <i class="bi bi-geo-alt-fill me-2 text-muted"></i>From <strong id="userHometown">Not set</strong>
                            </div>
                            <div class="mb-3">
                                <i class="bi bi-clock-fill me-2 text-muted"></i>Joined <span id="joinDate">Loading...</span>
                            </div>
                            <button class="btn btn-light w-100 border">Edit details</button>
                        </div>
                    </div>

                    <!-- Friends Card (Compact) -->
                    <div class="card mb-3 border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h5 class="fw-bold mb-0">Friends</h5>
                                    <div class="text-muted small" id="friendCountText">0 friends</div>
                                </div>
                                <a href="friends.html" class="text-primary text-decoration-none">See all friends</a>
                            </div>
                            <div class="row g-2" id="friendsGrid">
                                <!-- Friends will be injected here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Posts -->
                <div class="col-lg-7">
                    <!-- Create Post -->
                    <div class="card mb-3 border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex gap-2 mb-3">
                                <img src="https://via.placeholder.com/40" class="rounded-circle user-avatar" width="40" height="40">
                                <input type="text" class="form-control rounded-pill bg-light border-0" placeholder="What's on your mind?" data-bs-toggle="modal" data-bs-target="#createPostModal">
                            </div>
                            <hr>
                            <div class="d-flex justify-content-around">
                                <button class="btn btn-light flex-fill"><i class="bi bi-camera-video-fill text-danger me-2"></i>Live</button>
                                <button class="btn btn-light flex-fill"><i class="bi bi-image-fill text-success me-2"></i>Photo</button>
                                <button class="btn btn-light flex-fill"><i class="bi bi-emoji-smile-fill text-warning me-2"></i>Feeling</button>
                            </div>
                        </div>
                    </div>

                    <!-- Filter Posts -->
                    <div class="card mb-3 border-0 shadow-sm">
                        <div class="card-body py-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5 class="mb-0 fw-bold">Posts</h5>
                                <button class="btn btn-light border"><i class="bi bi-sliders me-2"></i>Filters</button>
                            </div>
                        </div>
                    </div>

                    <!-- User Posts Container -->
                    <div id="userPostsList">
                        <!-- Posts will be loaded here -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div class="modal fade" id="createPostModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold w-100 text-center">Create post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <img src="https://via.placeholder.com/40" class="rounded-circle user-avatar" width="40" height="40">
                        <div>
                            <strong class="user-name-text">User</strong>
                            <div class="dropdown d-inline">
                                <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown">
                                    <i class="bi bi-globe"></i> Public
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#"><i class="bi bi-globe me-2"></i>Public</a></li>
                                    <li><a class="dropdown-item" href="#"><i class="bi bi-people me-2"></i>Friends</a></li>
                                    <li><a class="dropdown-item" href="#"><i class="bi bi-lock me-2"></i>Only me</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <textarea class="form-control border-0" rows="5" placeholder="What's on your mind?" id="postContent"></textarea>
                    <div id="imagePreview" class="mt-2 text-center" style="display:none;">
                        <img src="" class="img-fluid rounded" style="max-height: 200px;">
                        <button type="button" class="btn btn-sm btn-danger mt-1" onclick="removeSelectedImage()">Remove</button>
                    </div>
                    <div class="border rounded p-3 mt-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <span>Add to your post</span>
                            <div>
                                <input type="file" id="postImageInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
                                <button type="button" class="btn btn-light rounded-circle" onclick="document.getElementById('postImageInput').click()"><i class="bi bi-image-fill text-success"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100 fw-bold" id="postBtn" onclick="createProfilePost()">Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="core.js"></script>
    <script>
        let selectedFile = null;

        function previewImage(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.querySelector('img').src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        function removeSelectedImage() {
            selectedFile = null;
            document.getElementById('postImageInput').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        window.addEventListener('verity_auth_ready', (e) => {
            const userData = e.detail;
            populateProfile(userData);
            loadUserPosts(currentUser.uid);
        });

        // ... populateProfile and loadFriendAvatars stay the same ...
            const pic = userData.profilePic || userData.photoURL || 'https://via.placeholder.com/150';
            document.getElementById('profilePic').src = pic;
            document.getElementById('navProfilePic').src = pic;
            document.querySelectorAll('.user-avatar').forEach(img => img.src = pic);
            
            document.getElementById('userName').textContent = userData.name;
            document.querySelectorAll('.user-name-text').forEach(el => el.textContent = userData.name);
            
            document.getElementById('userBio').textContent = userData.bio || 'No bio yet.';
            document.getElementById('userLocation').textContent = userData.location || 'Not set';
            document.getElementById('userHometown').textContent = userData.hometown || 'Not set';
            
            if (userData.createdAt) {
                document.getElementById('joinDate').textContent = new Date(userData.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } else {
                document.getElementById('joinDate').textContent = 'a while ago';
            }

            // Load friend count
            db.ref('friends/' + currentUser.uid).on('value', snap => {
                const count = snap.numChildren();
                document.getElementById('friendCount').textContent = `${count} friends`;
                document.getElementById('friendCountText').textContent = `${count} friends`;
                loadFriendAvatars(snap);
            });
        }

        function loadFriendAvatars(friendsSnap) {
            const grid = document.getElementById('friendsGrid');
            grid.innerHTML = '';
            let i = 0;
            friendsSnap.forEach(child => {
                if (i < 6) {
                    db.ref('users/' + child.key).once('value', uSnap => {
                        const u = uSnap.val();
                        if (u) {
                            const col = document.createElement('div');
                            col.className = 'col-4';
                            col.innerHTML = `
                                <div>
                                    <img src="${u.profilePic || u.photoURL || 'https://via.placeholder.com/150'}" class="w-100 rounded shadow-sm" style="aspect-ratio: 1/1; object-fit: cover;">
                                    <div class="small mt-1 text-truncate"><strong>${u.name}</strong></div>
                                </div>
                            `;
                            grid.appendChild(col);
                        }
                    });
                }
                i++;
            });
        }

        function loadUserPosts(uid) {
            const postsList = document.getElementById('userPostsList');
            db.ref('posts').orderByChild('userId').equalTo(uid).on('value', snapshot => {
                postsList.innerHTML = '';
                const posts = [];
                snapshot.forEach(child => {
                    posts.unshift({ id: child.key, ...child.val() });
                });

                if (posts.length === 0) {
                    postsList.innerHTML = '<div class="card border-0 shadow-sm"><div class="card-body text-center py-5"><p class="text-muted">No posts yet.</p></div></div>';
                    return;
                }

                posts.forEach(post => {
                    const postEl = document.createElement('div');
                    postEl.className = 'card mb-3 border-0 shadow-sm';
                    postEl.innerHTML = `
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="d-flex align-items-center gap-2">
                                    <img src="${document.getElementById('profilePic').src}" class="rounded-circle" width="40" height="40">
                                    <div>
                                        <strong>${document.getElementById('userName').textContent}</strong>
                                        <div class="small text-muted">${formatTimestamp(post.timestamp)} <i class="bi bi-globe"></i></div>
                                    </div>
                                </div>
                                <div class="dropdown">
                                    <button class="btn btn-light rounded-circle" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li><button class="dropdown-item text-danger" onclick="deletePost('${post.id}')"><i class="bi bi-trash me-2"></i>Delete</button></li>
                                    </ul>
                                </div>
                            </div>
                            <p>${escapeHtml(post.content)}</p>
                            ${post.imageURL ? `<img src="${post.imageURL}" class="w-100 rounded mb-2" alt="Post">` : ''}
                            <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
                                <span><i class="bi bi-hand-thumbs-up-fill text-primary"></i> ${post.likeCount || 0}</span>
                                <span>${post.commentCount || 0} comments</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-around">
                                <button class="btn btn-light flex-fill"><i class="bi bi-hand-thumbs-up me-2"></i>Like</button>
                                <button class="btn btn-light flex-fill"><i class="bi bi-chat me-2"></i>Comment</button>
                                <button class="btn btn-light flex-fill"><i class="bi bi-share me-2"></i>Share</button>
                            </div>
                        </div>
                    `;
                    postsList.appendChild(postEl);
                });
            });
        }

        async function createProfilePost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content && !selectedFile) return;

            const postBtn = document.getElementById('postBtn');
            postBtn.disabled = true;
            postBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';

            try {
                let imageURL = null;
                const postId = db.ref('posts').push().key;

                if (selectedFile) {
                    imageURL = await fileToBase64(selectedFile, 800);
                }

                await db.ref('posts/' + postId).set({
                    userId: currentUser.uid,
                    content: content,
                    imageURL: imageURL,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    likeCount: 0,
                    commentCount: 0
                });

                document.getElementById('postContent').value = '';
                removeSelectedImage();
                bootstrap.Modal.getInstance(document.getElementById('createPostModal')).hide();
                showToast('Post added to your profile!', 'success');
            } catch (error) {
                console.error(error);
                showToast('Error: ' + error.message, 'danger');
            } finally {
                postBtn.disabled = false;
                postBtn.innerHTML = 'Post';
            }
        }

        async function deletePost(postId) {
            if (confirm('Are you sure you want to delete this post?')) {
                await db.ref('posts/' + postId).remove();
                showToast('Post deleted', 'info');
            }
        }
    </script>
</body>
</html>
