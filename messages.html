<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger - Verity | Real Connections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="fb-style.css">
    <link rel="shortcut icon" href="icons/logo.svg" type="image/x-icon">
    <style>
        .chat-window { height: calc(100vh - 140px); }
        .messages-container { height: calc(100vh - 280px); overflow-y: auto; display: flex; flex-direction: column; }
        .message-bubble { max-width: 75%; padding: 8px 15px; border-radius: 18px; margin-bottom: 8px; position: relative; }
        .message-sent { background: var(--primary-teal); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-received { background: #f0f2f5; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-item.active { background: rgba(0, 128, 128, 0.1); border-right: 4px solid var(--primary-teal); }
    </style>
</head>
<body class="bg-white">
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom fixed-top shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center me-3" href="home.html">
                    <img src="icons/logo.svg" alt="Verity" style="height: 40px; margin-right: 8px;">
                    Verity
                </a>
            </div>
            
            <ul class="navbar-nav mx-auto d-none d-lg-flex">
                <li class="nav-item"><a class="nav-link" href="home.html"><i class="bi bi-house-door-fill fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="friends.html"><i class="bi bi-people fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="watch.html"><i class="bi bi-play-btn fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="groups.html"><i class="bi bi-collection fs-4"></i></a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light rounded-circle p-2" onclick="window.location.href='messages.html'"><i class="bi bi-chat-dots-fill text-primary"></i></button>
                <a href="notifications.html" class="btn btn-light rounded-circle p-2"><i class="bi bi-bell-fill"></i></a>
                <div class="dropdown">
                    <button class="btn p-0" data-bs-toggle="dropdown">
                        <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" alt="Profile">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="login.html" onclick="auth.signOut()"><i class="bi bi-box-arrow-right me-2"></i> Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-content p-0" style="margin-top: 60px;">
        <div class="row g-0">
            <!-- Sidebar: Chat List -->
            <div class="col-lg-3 col-md-4 border-end bg-light" style="height: calc(100vh - 60px); overflow-y: auto;">
                <div class="p-3 bg-white border-bottom sticky-top">
                    <h3 class="fw-bold mb-3">Chats</h3>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                        <input type="search" class="form-control bg-light border-0" placeholder="Search Messenger">
                    </div>
                </div>
                <div id="chatList" class="list-group list-group-flush">
                    <!-- Chats will be injected here -->
                    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
                </div>
            </div>

            <!-- Main: Chat Window -->
            <div class="col-lg-9 col-md-8 bg-white d-flex flex-column chat-window">
                <div id="noChatSelected" class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <i class="bi bi-chat-dots text-muted" style="font-size: 5rem;"></i>
                    <h4 class="mt-3">Select a chat to start messaging</h4>
                    <p class="text-muted">Private, secure, and chronological.</p>
                </div>

                <div id="activeChat" style="display: none;" class="flex-grow-1 d-flex flex-column">
                    <!-- Chat Header -->
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" id="activeChatPic" width="40" height="40">
                            <div>
                                <strong id="activeChatName">User Name</strong>
                                <div class="small text-success" id="activeChatStatus">Active now</div>
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-light rounded-circle"><i class="bi bi-telephone-fill text-primary"></i></button>
                            <button class="btn btn-light rounded-circle"><i class="bi bi-camera-video-fill text-primary"></i></button>
                            <button class="btn btn-light rounded-circle"><i class="bi bi-info-circle-fill text-primary"></i></button>
                        </div>
                    </div>

                    <!-- Messages Area -->
                    <div class="messages-container p-3" id="messagesList">
                        <!-- Messages will be injected here -->
                    </div>

                    <!-- Message Input -->
                    <div class="p-3 border-top bg-white">
                        <form id="messageForm" class="d-flex gap-2 align-items-center">
                            <button type="button" class="btn btn-light rounded-circle"><i class="bi bi-plus-lg text-primary"></i></button>
                            <button type="button" class="btn btn-light rounded-circle"><i class="bi bi-image-fill text-primary"></i></button>
                            <div class="flex-grow-1">
                                <input type="text" class="form-control rounded-pill" placeholder="Write a message..." id="messageInput" autocomplete="off">
                            </div>
                            <button type="submit" class="btn btn-primary rounded-circle"><i class="bi bi-send-fill"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="core.js"></script>
    <script>
        let activeRecipientId = null;
        let activeChatId = null;

        window.addEventListener('verity_auth_ready', (e) => {
            document.querySelectorAll('.nav-profile-pic').forEach(img => img.src = e.detail.profilePic || e.detail.photoURL || 'https://via.placeholder.com/150');
            loadChatList();
            
            // Handle URL parameter for opening a chat
            const urlParams = new URLSearchParams(window.location.search);
            const chatUid = urlParams.get('chat');
            if (chatUid) {
                openChat(chatUid);
            }
        });

        function loadChatList() {
            db.ref('friends/' + currentUser.uid).on('value', snapshot => {
                const list = document.getElementById('chatList');
                list.innerHTML = '';
                
                if (!snapshot.exists()) {
                    list.innerHTML = '<div class="p-4 text-center text-muted">No friends yet. Find friends to start chatting!</div>';
                    return;
                }

                snapshot.forEach(child => {
                    db.ref('users/' + child.key).once('value', uSnap => {
                        const user = uSnap.val();
                        if (user) {
                            const item = document.createElement('button');
                            item.className = 'list-group-item list-group-item-action border-0 d-flex align-items-center p-3 chat-item';
                            item.id = `chat-item-${child.key}`;
                            item.onclick = () => openChat(child.key);
                            
                            item.innerHTML = `
                                <img src="${user.profilePic || user.photoURL || 'https://via.placeholder.com/50'}" class="rounded-circle me-3" width="50" height="50">
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between">
                                        <strong>${user.name}</strong>
                                    </div>
                                    <div class="text-muted small text-truncate">Click to message</div>
                                </div>
                            `;
                            list.appendChild(item);
                        }
                    });
                });
            });
        }

        async function openChat(recipientId) {
            activeRecipientId = recipientId;
            activeChatId = currentUser.uid < recipientId ? `${currentUser.uid}_${recipientId}` : `${recipientId}_${currentUser.uid}`;
            
            // UI Updates
            document.getElementById('noChatSelected').style.display = 'none';
            document.getElementById('activeChat').style.display = 'flex';
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            const item = document.getElementById(`chat-item-${recipientId}`);
            if (item) item.classList.add('active');

            // Load Recipient Info
            const uSnap = await db.ref('users/' + recipientId).once('value');
            const user = uSnap.val();
            document.getElementById('activeChatName').textContent = user.name;
            document.getElementById('activeChatPic').src = user.profilePic || user.photoURL || 'https://via.placeholder.com/40';

            // Load Messages
            loadMessages(activeChatId);
        }

        function loadMessages(chatId) {
            const list = document.getElementById('messagesList');
            db.ref('chats/' + chatId).off(); // Remove previous listeners
            db.ref('chats/' + chatId).on('value', snapshot => {
                list.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val();
                    const isSent = msg.senderId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message-bubble ${isSent ? 'message-sent' : 'message-received'}`;
                    div.textContent = msg.text;
                    list.appendChild(div);
                });
                list.scrollTop = list.scrollHeight;
            });
        }

        document.getElementById('messageForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            const msgRef = db.ref('chats/' + activeChatId).push();
            await msgRef.set({
                senderId: currentUser.uid,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = '';
        };
    </script>
</body>
</html>
