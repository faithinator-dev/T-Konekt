<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verity - Real Connections | No Algorithms</title>
    <meta name="description" content="Stay updated with Verity's chronological feed. Real connections, no algorithms, pure privacy.">
    <meta name="keywords" content="privacy social media, chronological feed, Verity home, real connections">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="fb-style.css">
    <link rel="shortcut icon" href="icons/logo.svg" type="image/x-icon">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom fixed-top shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center me-3" href="home.html">
                    <img src="icons/logo.svg" alt="Verity" style="height: 40px; margin-right: 8px;">
                    Verity
                </a>
                <div class="input-group search-box">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                    <input type="search" class="form-control bg-light border-0" placeholder="Search Verity">
                </div>
            </div>
            
            <ul class="navbar-nav mx-auto d-none d-lg-flex">
                <li class="nav-item">
                    <a class="nav-link active" href="home.html"><i class="bi bi-house-door-fill fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="friends.html"><i class="bi bi-people fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="watch.html"><i class="bi bi-play-btn fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="groups.html"><i class="bi bi-collection fs-4"></i></a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light rounded-circle p-2"><i class="bi bi-grid-3x3-gap-fill"></i></button>
                <button class="btn btn-light rounded-circle p-2" onclick="window.location.href='messages.html'"><i class="bi bi-chat-dots-fill"></i></button>
                <a href="notifications.html" class="btn btn-light rounded-circle p-2 position-relative">
                    <i class="bi bi-bell-fill"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display: none;">
                        0
                    </span>
                </a>
                <div class="dropdown">
                    <button class="btn p-0" data-bs-toggle="dropdown">
                        <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" alt="Profile">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="login.html" onclick="auth.signOut()"><i class="bi bi-box-arrow-right me-2"></i> Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div class="row">
            <!-- Left Sidebar -->
            <div class="col-lg-3 d-none d-lg-block left-sidebar">
                <div class="list-group list-group-flush">
                    <a href="profile.html" class="list-group-item list-group-item-action border-0">
                        <img src="https://via.placeholder.com/40" class="rounded-circle me-2 nav-profile-pic" width="36"> <strong id="sidebarUserName">John Doe</strong>
                    </a>
                    <a href="friends.html" class="list-group-item list-group-item-action border-0">
                        <i class="bi bi-people-fill text-primary me-2 fs-5"></i> Friends
                    </a>
                    <a href="groups.html" class="list-group-item list-group-item-action border-0">
                        <i class="bi bi-collection-fill text-primary me-2 fs-5"></i> Groups
                    </a>
                    <a href="watch.html" class="list-group-item list-group-item-action border-0">
                        <i class="bi bi-play-btn-fill text-primary me-2 fs-5"></i> Watch
                    </a>
                    <a href="messages.html" class="list-group-item list-group-item-action border-0">
                        <i class="bi bi-messenger text-primary me-2 fs-5"></i> Messenger
                    </a>
                </div>
            </div>

            <!-- Main Feed -->
            <div class="col-lg-6 col-md-8 mx-auto feed-center">
                <!-- Stories -->
                <div class="card mb-3 border-0 shadow-sm" style="background: transparent;">
                    <div class="card-body p-0">
                        <div class="d-flex gap-2 overflow-auto pb-2 stories-container" id="storiesList">
                            <!-- Create Story Card -->
                            <div class="story position-relative shadow-sm" style="min-width: 110px; height: 190px; border-radius: 12px; overflow: hidden; background: white;" onclick="document.getElementById('storyInput').click()">
                                <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=110&h=190&fit=crop" class="w-100 h-75 object-fit-cover opacity-50">
                                <div class="position-absolute bottom-0 start-0 w-100 bg-white text-center p-2" style="height: 35%;">
                                    <div class="btn btn-primary rounded-circle position-absolute translate-middle-x" style="top: -20px; left: 50%; width: 40px; height: 40px; border: 4px solid white;">
                                        <i class="bi bi-plus-lg"></i>
                                    </div>
                                    <span class="small fw-bold mt-2 d-block">Create Story</span>
                                </div>
                                <input type="file" id="storyInput" accept="image/*" style="display:none;" onchange="uploadStory(this)">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Create Post -->
                <div class="card mb-3 border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex gap-2 mb-3">
                            <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" width="40" height="40">
                            <input type="text" class="form-control rounded-pill bg-light border-0" placeholder="What's on your mind?" data-bs-toggle="modal" data-bs-target="#createPostModal">
                        </div>
                        <hr class="opacity-5">
                        <div class="d-flex justify-content-around">
                            <button class="btn btn-light flex-fill text-muted"><i class="bi bi-camera-video-fill text-danger me-2"></i>Live</button>
                            <button class="btn btn-light flex-fill text-muted" data-bs-toggle="modal" data-bs-target="#createPostModal"><i class="bi bi-image-fill text-success me-2"></i>Photo</button>
                            <button class="btn btn-light flex-fill text-muted"><i class="bi bi-emoji-smile-fill text-warning me-2"></i>Feeling</button>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 fw-bold">Chronological Feed</h5>
                    <span class="privacy-badge"><i class="bi bi-shield-check"></i> No Algorithms</span>
                </div>

                <div id="verityPostsList"></div>
            </div>

            <!-- Right Sidebar -->
            <div class="col-lg-3 d-none d-lg-block right-sidebar">
                <div class="card border-0">
                    <div class="card-body">
                        <h6 class="text-muted mb-3">Contacts</h6>
                        <div id="contactsList" class="list-group list-group-flush"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold w-100 text-center">Create post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" width="40">
                        <div>
                            <strong id="modalUserName">User</strong>
                            <div class="small text-muted"><i class="bi bi-globe"></i> Public</div>
                        </div>
                    </div>
                    <textarea class="form-control border-0" rows="5" placeholder="What's on your mind?" id="postTextarea"></textarea>
                    <div id="imagePreview" class="mt-2 text-center" style="display:none;">
                        <img src="" class="img-fluid rounded" style="max-height: 200px;">
                        <button type="button" class="btn btn-sm btn-danger mt-1" onclick="removeSelectedImage()">Remove</button>
                    </div>
                    <div class="border rounded p-3 mt-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <span>Add to your post</span>
                            <div>
                                <input type="file" id="postImageInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
                                <button type="button" class="btn btn-light rounded-circle" onclick="document.getElementById('postImageInput').click()"><i class="bi bi-image-fill text-success"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100 fw-bold" id="postBtn">Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="core.js"></script>
    
    <script>
        let selectedFile = null;
        let userDataGlobal = null;
        const postsListEl = document.getElementById('verityPostsList');

        async function loadStories() {
            const storiesList = document.getElementById('storiesList');
            db.ref('stories').orderByChild('timestamp').limitToLast(20).on('value', async (snapshot) => {
                while (storiesList.children.length > 1) storiesList.removeChild(storiesList.lastChild);
                const stories = [];
                snapshot.forEach(child => {
                    const story = child.val();
                    if (Date.now() - story.timestamp < 24 * 60 * 60 * 1000) stories.unshift({ id: child.key, ...story });
                });
                for (const story of stories) {
                    const userSnap = await db.ref('users/' + story.userId).once('value');
                    const user = userSnap.val() || { name: 'User', profilePic: 'https://via.placeholder.com/150' };
                    const storyEl = document.createElement('div');
                    storyEl.className = 'story position-relative shadow-sm';
                    storyEl.style = 'min-width: 110px; height: 190px; border-radius: 12px; overflow: hidden; cursor: pointer;';
                    storyEl.innerHTML = `
                        <img src="${story.imageURL}" class="w-100 h-100 object-fit-cover transition">
                        <img src="${user.profilePic || 'https://via.placeholder.com/40'}" class="rounded-circle border border-3 border-primary position-absolute top-0 start-0 m-2 shadow" width="40" height="40">
                        <span class="position-absolute bottom-0 start-0 p-2 text-white small fw-bold" style="text-shadow: 0 1px 4px rgba(0,0,0,0.8);">${escapeHtml(user.name.split(' ')[0])}</span>
                    `;
                    storiesList.appendChild(storyEl);
                }
            });
        }

        async function loadChronologicalFeed() {
            db.ref('posts').orderByChild('timestamp').on('value', async (snapshot) => {
                postsListEl.innerHTML = '';
                const posts = [];
                snapshot.forEach(child => posts.unshift({ id: child.key, ...child.val() }));
                for (const post of posts) {
                    const userSnap = await db.ref('users/' + post.userId).once('value');
                    const user = userSnap.val() || { name: 'Unknown', profilePic: 'https://via.placeholder.com/150' };
                    const postEl = document.createElement('div');
                    postEl.className = 'card mb-3 border-0 shadow-sm transition';
                    postEl.innerHTML = `
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <img src="${user.profilePic}" class="rounded-circle" width="40" height="40">
                                <div>
                                    <strong>${escapeHtml(user.name)}</strong>
                                    <div class="small text-muted">${formatTimestamp(post.timestamp)} <i class="bi bi-globe"></i></div>
                                </div>
                            </div>
                            <p>${escapeHtml(post.content)}</p>
                            ${post.imageURL ? `<img src="${post.imageURL}" class="w-100 rounded mb-2 shadow-sm">` : ''}
                            <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
                                <span id="likeCount-${post.id}"><i class="bi bi-hand-thumbs-up-fill text-primary"></i> ${post.likeCount || 0}</span>
                                <span style="cursor:pointer" onclick="toggleComments('${post.id}')">${post.commentCount || 0} comments</span>
                            </div>
                            <hr class="opacity-5">
                            <div class="d-flex justify-content-around">
                                <button class="btn btn-light flex-fill text-muted" id="likeBtn-${post.id}" onclick="toggleLike('${post.id}')"><i class="bi bi-hand-thumbs-up"></i> Like</button>
                                <button class="btn btn-light flex-fill text-muted" onclick="toggleComments('${post.id}')"><i class="bi bi-chat"></i> Comment</button>
                                <button class="btn btn-light flex-fill text-muted"><i class="bi bi-share"></i> Share</button>
                            </div>
                            <div id="commentSection-${post.id}" class="mt-3" style="display:none;">
                                <hr class="opacity-5">
                                <div id="commentList-${post.id}" class="mb-3"></div>
                                <div class="d-flex gap-2">
                                    <img src="${userDataGlobal?.profilePic || 'https://via.placeholder.com/32'}" class="rounded-circle nav-profile-pic" width="32">
                                    <input type="text" class="form-control form-control-sm bg-light border-0 rounded-pill" placeholder="Write a comment..." onkeypress="handleCommentKey(event, '${post.id}')">
                                </div>
                            </div>
                        </div>
                    `;
                    postsListEl.appendChild(postEl);
                    loadComments(post.id);
                    checkIfLiked(post.id);
                }
            });
        }

        async function toggleLike(postId) {
            const u = firebase.auth().currentUser; if (!u) return;
            const likeRef = db.ref(`likes/${postId}/${u.uid}`);
            const postRef = db.ref(`posts/${postId}/likeCount`);
            const snap = await likeRef.once('value');
            if (snap.exists()) {
                await likeRef.remove(); await postRef.set(firebase.database.ServerValue.increment(-1));
            } else {
                await likeRef.set(true); await postRef.set(firebase.database.ServerValue.increment(1));
            }
        }

        function checkIfLiked(postId) {
            const u = firebase.auth().currentUser; if (!u) return;
            db.ref(`likes/${postId}/${u.uid}`).on('value', snap => {
                const btn = document.getElementById(`likeBtn-${postId}`);
                if (btn) {
                    if (snap.exists()) { btn.classList.add('text-primary', 'fw-bold'); btn.innerHTML = '<i class="bi bi-hand-thumbs-up-fill"></i> Liked'; }
                    else { btn.classList.remove('text-primary', 'fw-bold'); btn.innerHTML = '<i class="bi bi-hand-thumbs-up"></i> Like'; }
                }
            });
            db.ref(`posts/${postId}/likeCount`).on('value', snap => {
                const el = document.getElementById(`likeCount-${postId}`);
                if (el) el.innerHTML = `<i class="bi bi-hand-thumbs-up-fill text-primary"></i> ${snap.val() || 0}`;
            });
        }

        function toggleComments(postId) {
            const el = document.getElementById(`commentSection-${postId}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function loadComments(postId) {
            const list = document.getElementById(`commentList-${postId}`);
            db.ref(`comments/${postId}`).on('value', snap => {
                list.innerHTML = '';
                snap.forEach(child => {
                    const c = child.val();
                    const div = document.createElement('div'); div.className = 'd-flex gap-2 mb-2';
                    db.ref(`users/${c.userId}`).once('value', uSnap => {
                        const u = uSnap.val() || { name: 'User', profilePic: 'https://via.placeholder.com/32' };
                        div.innerHTML = `<img src="${u.profilePic}" class="rounded-circle" width="32" height="32"><div class="bg-light rounded-4 p-2 px-3 flex-grow-1"><div class="small fw-bold">${escapeHtml(u.name)}</div><div class="small">${escapeHtml(c.text)}</div></div>`;
                    });
                    list.appendChild(div);
                });
            });
        }

        async function handleCommentKey(e, postId) {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const text = e.target.value.trim(); const u = firebase.auth().currentUser; e.target.value = '';
                await db.ref(`comments/${postId}`).push({ userId: u.uid, text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
                await db.ref(`posts/${postId}/commentCount`).set(firebase.database.ServerValue.increment(1));
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    const p = document.getElementById('imagePreview');
                    p.querySelector('img').src = e.target.result; p.style.display = 'block';
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        function removeSelectedImage() {
            selectedFile = null; document.getElementById('postImageInput').value = ''; document.getElementById('imagePreview').style.display = 'none';
        }

        async function uploadStory(input) {
            if (!input.files || !input.files[0]) return;
            const user = firebase.auth().currentUser; if (!user) return;
            showToast('Processing...', 'info');
            try {
                const base64 = await fileToBase64(input.files[0], 400);
                await db.ref('stories').push({ userId: user.uid, imageURL: base64, timestamp: firebase.database.ServerValue.TIMESTAMP });
                showToast('Story shared!', 'success');
            } catch (e) { showToast(e.message, 'danger'); }
        }

        async function createVerityPost() {
            const content = document.getElementById('postTextarea').value.trim();
            if (!content && !selectedFile) return;
            const user = firebase.auth().currentUser; if (!user) return;
            const btn = document.getElementById('postBtn'); btn.disabled = true; btn.innerHTML = 'Posting...';
            try {
                const url = selectedFile ? await fileToBase64(selectedFile, 800) : null;
                await db.ref('posts').push({ userId: user.uid, content: content, imageURL: url, timestamp: firebase.database.ServerValue.TIMESTAMP, likeCount: 0, commentCount: 0 });
                document.getElementById('postTextarea').value = ''; removeSelectedImage();
                bootstrap.Modal.getInstance(document.getElementById('createPostModal')).hide();
                showToast('Shared!', 'success');
            } catch (e) { showToast(e.message, 'danger'); }
            finally { btn.disabled = false; btn.innerHTML = 'Post'; }
        }

        function initVerity(userData) {
            userDataGlobal = userData;
            document.querySelectorAll('img.nav-profile-pic').forEach(img => img.src = userData.profilePic || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=40&h=40&fit=crop');
            const nameEl = document.getElementById('sidebarUserName'); if (nameEl) nameEl.textContent = userData.name;
            const modalName = document.getElementById('modalUserName'); if (modalName) modalName.textContent = userData.name;
            loadChronologicalFeed(); loadStories();
        }

        window.addEventListener('verity_auth_ready', (e) => initVerity(e.detail));
        if (typeof auth !== 'undefined' && auth.currentUser) {
            db.ref('users/' + auth.currentUser.uid).once('value').then(snap => { if (snap.exists()) initVerity(snap.val()); });
        }
        document.getElementById('postBtn').onclick = createVerityPost;
    </script>
</body>
</html>
