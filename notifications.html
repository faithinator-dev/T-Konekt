<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Verity | Real Connections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="fb-style.css">
    <link rel="shortcut icon" href="icons/logo.svg" type="image/x-icon">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom fixed-top shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center me-3" href="home.html">
                    <img src="icons/logo.svg" alt="Verity" style="height: 40px; margin-right: 8px;">
                    Verity
                </a>
            </div>
            
            <ul class="navbar-nav mx-auto d-none d-lg-flex">
                <li class="nav-item"><a class="nav-link" href="home.html"><i class="bi bi-house-door-fill fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="friends.html"><i class="bi bi-people fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="watch.html"><i class="bi bi-play-btn fs-4"></i></a></li>
                <li class="nav-item"><a class="nav-link" href="groups.html"><i class="bi bi-collection fs-4"></i></a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light rounded-circle p-2" onclick="window.location.href='messages.html'"><i class="bi bi-chat-dots-fill"></i></button>
                <a href="notifications.html" class="btn btn-light rounded-circle p-2 active position-relative">
                    <i class="bi bi-bell-fill text-primary"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display: none;">0</span>
                </a>
                <div class="dropdown">
                    <button class="btn p-0" data-bs-toggle="dropdown">
                        <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" alt="Profile">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="login.html" onclick="auth.signOut()"><i class="bi bi-box-arrow-right me-2"></i> Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container main-content" style="padding-top: 80px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h4 class="mb-0 fw-bold">Notifications</h4>
                        <button class="btn btn-light btn-sm" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="card-body p-0">
                        <div id="notificationsList">
                            <!-- Notifications will be loaded here -->
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="core.js"></script>
    <script>
        window.addEventListener('verity_auth_ready', (e) => {
            document.querySelectorAll('.nav-profile-pic').forEach(img => img.src = e.detail.profilePic || e.detail.photoURL || 'https://via.placeholder.com/150');
            loadNotifications();
        });

        function loadNotifications() {
            const list = document.getElementById('notificationsList');
            
            // Combine Friend Requests and Activity Notifications
            db.ref('friendRequests/' + currentUser.uid).on('value', requestSnap => {
                db.ref('notifications/' + currentUser.uid).on('value', activitySnap => {
                    list.innerHTML = '';
                    const allNotifications = [];

                    // Process Friend Requests
                    requestSnap.forEach(child => {
                        const req = child.val();
                        if (req.status === 'received') {
                            allNotifications.push({
                                id: 'req_' + child.key,
                                type: 'friend_request',
                                userId: child.key,
                                timestamp: req.timestamp,
                                read: false
                            });
                        }
                    });

                    // Process Activity Notifications (Likes, etc.)
                    activitySnap.forEach(child => {
                        allNotifications.push({
                            id: child.key,
                            ...child.val()
                        });
                    });

                    // Sort by timestamp newest first
                    allNotifications.sort((a, b) => b.timestamp - a.timestamp);

                    if (allNotifications.length === 0) {
                        list.innerHTML = `
                            <div class="text-center py-5 text-muted">
                                <i class="bi bi-bell-slash fs-1"></i>
                                <p class="mt-3">No notifications yet.</p>
                            </div>
                        `;
                        return;
                    }

                    allNotifications.forEach(notif => {
                        renderNotification(notif, list);
                    });
                });
            });
        }

        async function renderNotification(notif, container) {
            const userSnap = await db.ref('users/' + notif.userId).once('value');
            const user = userSnap.val() || { name: 'Unknown User', profilePic: 'https://via.placeholder.com/150' };
            const pic = user.profilePic || user.photoURL || 'https://via.placeholder.com/150';
            
            let message = '';
            let icon = '';
            let link = '#';

            if (notif.type === 'friend_request') {
                message = `<strong>${user.name}</strong> sent you a friend request.`;
                icon = 'bi-person-plus-fill text-primary';
                link = 'friends.html';
            } else if (notif.type === 'like') {
                message = `<strong>${user.name}</strong> liked your post.`;
                icon = 'bi-hand-thumbs-up-fill text-primary';
                link = 'home.html';
            } else if (notif.type === 'comment') {
                message = `<strong>${user.name}</strong> commented on your post.`;
                icon = 'bi-chat-fill text-success';
                link = 'home.html';
            }

            const item = document.createElement('div');
            item.className = `notification-item p-3 border-bottom ${notif.read ? '' : 'bg-light'}`;
            item.innerHTML = `
                <div class="d-flex align-items-center">
                    <div class="me-3 position-relative">
                        <img src="${pic}" class="rounded-circle" width="56" height="56">
                        <div class="position-absolute bottom-0 end-0 bg-white rounded-circle shadow-sm p-1" style="transform: translate(25%, 25%);">
                            <i class="bi ${icon} small"></i>
                        </div>
                    </div>
                    <div class="flex-grow-1" onclick="window.location.href='${link}'" style="cursor: pointer;">
                        <p class="mb-0 text-dark">${message}</p>
                        <small class="text-muted">${formatTimestamp(notif.timestamp)}</small>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-light rounded-circle" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><button class="dropdown-item" onclick="deleteNotification('${notif.id}')">Delete</button></li>
                        </ul>
                    </div>
                </div>
            `;
            container.appendChild(item);
        }

        async function deleteNotification(id) {
            if (id.startsWith('req_')) {
                const targetUid = id.replace('req_', '');
                await db.ref(`friendRequests/${currentUser.uid}/${targetUid}`).remove();
                await db.ref(`friendRequests/${targetUid}/${currentUser.uid}`).remove();
            } else {
                await db.ref(`notifications/${currentUser.uid}/${id}`).remove();
            }
            showToast('Notification removed', 'info');
        }

        async function markAllAsRead() {
            const snap = await db.ref('notifications/' + currentUser.uid).once('value');
            const updates = {};
            snap.forEach(child => {
                updates[`notifications/${currentUser.uid}/${child.key}/read`] = true;
            });
            await db.ref().update(updates);
            showToast('All notifications marked as read', 'success');
        }
    </script>

    <style>
        .notification-item:hover { background-color: #f8f9fa !important; }
    </style>
</body>
</html>
