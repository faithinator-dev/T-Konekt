<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Verity | Real Connections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="fb-style.css">
    <link rel="shortcut icon" href="icons/logo.svg" type="image/x-icon">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand navbar-light bg-white border-bottom fixed-top shadow-sm">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a class="navbar-brand fw-bold fs-4 text-primary d-flex align-items-center me-3" href="home.html">
                    <img src="icons/logo.svg" alt="Verity" style="height: 40px; margin-right: 8px;">
                    Verity
                </a>
                <div class="input-group search-box">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                    <input type="search" class="form-control bg-light border-0" placeholder="Search Verity" id="globalSearch">
                </div>
            </div>
            
            <ul class="navbar-nav mx-auto d-none d-lg-flex">
                <li class="nav-item">
                    <a class="nav-link" href="home.html"><i class="bi bi-house-door-fill fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="friends.html"><i class="bi bi-people fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="watch.html"><i class="bi bi-play-btn fs-4"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="groups.html"><i class="bi bi-collection fs-4"></i></a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light rounded-circle p-2"><i class="bi bi-grid-3x3-gap-fill"></i></button>
                <button class="btn btn-light rounded-circle p-2" onclick="window.location.href='messages.html'"><i class="bi bi-chat-dots-fill"></i></button>
                <a href="notifications.html" class="btn btn-light rounded-circle p-2 position-relative">
                    <i class="bi bi-bell-fill"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display: none;">
                        0
                    </span>
                </a>
                <div class="dropdown">
                    <button class="btn p-0" data-bs-toggle="dropdown">
                        <img src="https://via.placeholder.com/40" class="rounded-circle nav-profile-pic" alt="Profile">
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="login.html" onclick="auth.signOut()"><i class="bi bi-box-arrow-right me-2"></i> Log Out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div class="row">
            <!-- Left Sidebar -->
            <div class="col-lg-3 col-md-4 left-sidebar">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-3">
                        <h3 class="fw-bold mb-3">Friends</h3>
                        <div class="list-group list-group-flush">
                            <button class="list-group-item list-group-item-action border-0 px-2 active" onclick="showFriendsSection('requests')">
                                <i class="bi bi-person-fill-add me-2 fs-5"></i> Friend Requests
                                <span class="badge bg-danger rounded-pill float-end" id="requestCountBadge" style="display: none;">0</span>
                            </button>
                            <button class="list-group-item list-group-item-action border-0 px-2" onclick="showFriendsSection('suggestions')">
                                <i class="bi bi-person-lines-fill me-2 fs-5"></i> Suggestions
                            </button>
                            <button class="list-group-item list-group-item-action border-0 px-2" onclick="showFriendsSection('all')">
                                <i class="bi bi-people-fill me-2 fs-5"></i> All Friends
                            </button>
                            <button class="list-group-item list-group-item-action border-0 px-2">
                                <i class="bi bi-gift-fill me-2 fs-5"></i> Birthdays
                            </button>
                            <button class="list-group-item list-group-item-action border-0 px-2">
                                <i class="bi bi-list-ul me-2 fs-5"></i> Custom Lists
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-9 col-md-8">
                <!-- Search Results (Dynamic) -->
                <div id="searchSection" style="display: none;" class="mb-4">
                    <h5 class="fw-bold mb-3">Search Results</h5>
                    <div class="row g-3" id="searchResultsGrid">
                        <!-- Search results will be injected here -->
                    </div>
                    <hr>
                </div>

                <!-- Friend Requests -->
                <div class="section-container" id="requestsSection">
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold mb-0">Friend Requests</h5>
                            </div>
                            <div class="row g-3" id="friendRequestsGrid">
                                <!-- Friend requests will be loaded here -->
                                <div class="col-12 text-center py-4" id="noRequestsMsg">
                                    <p class="text-muted">No pending friend requests.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Suggestions / People You May Know -->
                <div class="section-container" id="suggestionsSection">
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3">People You May Know</h5>
                            <div class="row g-3" id="suggestionsGrid">
                                <!-- Suggestions will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- All Friends -->
                <div class="section-container" id="allFriendsSection" style="display: none;">
                    <div class="card border-0 shadow-sm mb-3">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3">All Friends</h5>
                            <div class="row g-3" id="allFriendsGrid">
                                <!-- All friends will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="core.js"></script>
    <script>
        window.addEventListener('verity_auth_ready', (e) => {
            const userData = e.detail;
            document.querySelectorAll('.nav-profile-pic').forEach(img => img.src = userData.profilePic || userData.photoURL || 'https://via.placeholder.com/150');
            
            loadFriendRequests();
            loadSuggestions();
            loadAllFriends();
        });

        // Section Switching
        function showFriendsSection(sectionId) {
            document.querySelectorAll('.section-container').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.list-group-item').forEach(i => i.classList.remove('active'));
            
            if (sectionId === 'requests') {
                document.getElementById('requestsSection').style.display = 'block';
                document.getElementById('suggestionsSection').style.display = 'block';
            } else if (sectionId === 'suggestions') {
                document.getElementById('suggestionsSection').style.display = 'block';
            } else if (sectionId === 'all') {
                document.getElementById('allFriendsSection').style.display = 'block';
            }
            
            event.currentTarget.classList.add('active');
        }

        // Search Logic
        document.getElementById('globalSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 2) {
                document.getElementById('searchSection').style.display = 'none';
                return;
            }

            db.ref('users').once('value', snapshot => {
                const resultsGrid = document.getElementById('searchResultsGrid');
                resultsGrid.innerHTML = '';
                let found = false;

                snapshot.forEach(child => {
                    const user = child.val();
                    if (child.key !== currentUser.uid && (user.name.toLowerCase().includes(query) || user.email.toLowerCase().includes(query))) {
                        const col = createUserCard(child.key, user, 'search');
                        resultsGrid.appendChild(col);
                        found = true;
                    }
                });

                document.getElementById('searchSection').style.display = found ? 'block' : 'none';
            });
        });

        function loadFriendRequests() {
            db.ref('friendRequests/' + currentUser.uid).on('value', snapshot => {
                const grid = document.getElementById('friendRequestsGrid');
                const badge = document.getElementById('requestCountBadge');
                grid.innerHTML = '';
                
                let count = 0;
                snapshot.forEach(child => {
                    const request = child.val();
                    if (request.status === 'received') {
                        count++;
                        db.ref('users/' + child.key).once('value', uSnap => {
                            const u = uSnap.val();
                            const col = createUserCard(child.key, u, 'request');
                            grid.appendChild(col);
                            document.getElementById('noRequestsMsg').style.display = 'none';
                        });
                    }
                });

                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                    grid.innerHTML = '<div class="col-12 text-center py-4"><p class="text-muted">No pending friend requests.</p></div>';
                }
            });
        }

        function loadSuggestions() {
            db.ref('users').limitToLast(12).once('value', snapshot => {
                const grid = document.getElementById('suggestionsGrid');
                grid.innerHTML = '';
                snapshot.forEach(child => {
                    if (child.key !== currentUser.uid) {
                        // Check if already friends or requested
                        db.ref(`friends/${currentUser.uid}/${child.key}`).once('value', fSnap => {
                            if (!fSnap.exists()) {
                                const col = createUserCard(child.key, child.val(), 'suggestion');
                                grid.appendChild(col);
                            }
                        });
                    }
                });
            });
        }

        function loadAllFriends() {
            db.ref('friends/' + currentUser.uid).on('value', snapshot => {
                const grid = document.getElementById('allFriendsGrid');
                grid.innerHTML = '';
                snapshot.forEach(child => {
                    db.ref('users/' + child.key).once('value', uSnap => {
                        const col = createUserCard(child.key, uSnap.val(), 'friend');
                        grid.appendChild(col);
                    });
                });
            });
        }

        function createUserCard(uid, user, type) {
            const col = document.createElement('div');
            col.className = 'col-lg-3 col-md-6';
            const pic = user.profilePic || user.photoURL || 'https://via.placeholder.com/300';
            
            let buttons = '';
            if (type === 'request') {
                buttons = `
                    <button class="btn btn-primary w-100 mb-2" onclick="confirmFriend('${uid}')">Confirm</button>
                    <button class="btn btn-light border w-100" onclick="deleteRequest('${uid}')">Delete</button>
                `;
            } else if (type === 'suggestion' || type === 'search') {
                buttons = `<button class="btn btn-primary w-100" onclick="sendFriendRequest('${uid}')"><i class="bi bi-person-plus-fill me-2"></i>Add Friend</button>`;
            } else if (type === 'friend') {
                buttons = `<button class="btn btn-light border w-100" onclick="window.location.href='messages.html?chat=${uid}'"><i class="bi bi-chat-dots-fill me-2"></i>Message</button>`;
            }

            col.innerHTML = `
                <div class="card h-100 border shadow-sm">
                    <img src="${pic}" class="card-img-top object-fit-cover" style="height: 200px;" alt="User">
                    <div class="card-body">
                        <h6 class="fw-bold mb-1 text-truncate">${user.name}</h6>
                        <p class="text-muted small mb-2">Verity User</p>
                        ${buttons}
                    </div>
                </div>
            `;
            return col;
        }

        async function sendFriendRequest(targetUid) {
            await db.ref(`friendRequests/${targetUid}/${currentUser.uid}`).set({ status: 'received', timestamp: firebase.database.ServerValue.TIMESTAMP });
            await db.ref(`friendRequests/${currentUser.uid}/${targetUid}`).set({ status: 'sent', timestamp: firebase.database.ServerValue.TIMESTAMP });
            showToast('Friend request sent!', 'success');
        }

        async function confirmFriend(targetUid) {
            const now = firebase.database.ServerValue.TIMESTAMP;
            await db.ref(`friends/${currentUser.uid}/${targetUid}`).set(now);
            await db.ref(`friends/${targetUid}/${currentUser.uid}`).set(now);
            await db.ref(`friendRequests/${currentUser.uid}/${targetUid}`).remove();
            await db.ref(`friendRequests/${targetUid}/${currentUser.uid}`).remove();
            showToast('You are now friends!', 'success');
        }

        async function deleteRequest(targetUid) {
            await db.ref(`friendRequests/${currentUser.uid}/${targetUid}`).remove();
            await db.ref(`friendRequests/${targetUid}/${currentUser.uid}`).remove();
            showToast('Request deleted', 'info');
        }
    </script>
</body>
</html>
